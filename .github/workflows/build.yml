name: Build APK

on:
  push:
    branches: [ main, master ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Fix layout XML issues
        run: |
          cd app/src/main/res/layout
          for f in fragment_book.xml fragment_cover_picker.xml fragment_search.xml fragment_settings.xml fragment_shelf.xml item_chapter.xml; do
            sed -i 's/android:gap="[^"]*"//g' "$f"
          done
          for f in item_book.xml item_cover.xml item_search_result.xml; do
            sed -i 's/android:paddingBottom="150%"/android:paddingBottom="0dp"/g' "$f"
          done

      - name: Install Gradle 8.4
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.4-bin.zip
          unzip -q gradle-8.4-bin.zip -d /opt/gradle
          echo "/opt/gradle/gradle-8.4/bin" >> $GITHUB_PATH

      - name: Build Debug APK
        run: gradle assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: MyLibrary-debug
          path: app/build/outputs/apk/debug/app-debug.apk
